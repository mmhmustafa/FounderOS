<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atlas Topology Viewer</title>
  <script src="__CYTOSCAPE_CDN__"></script>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; color: #172033; background: #f3f6fb; }
    header { display: flex; gap: 12px 16px; align-items: center; padding: 12px 18px; background: #111827; color: white; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 18px; white-space: nowrap; }
    #search { flex: 1 1 180px; max-width: 440px; min-width: 0; border: 0; border-radius: 6px; padding: 9px 11px; font: inherit; }
    button { border: 1px solid #94a3b8; border-radius: 6px; padding: 8px 12px; background: white; cursor: pointer; font: inherit; }
    a:focus-visible, button:focus-visible, input:focus-visible, summary:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) 300px; min-height: 420px; height: calc(100vh - 62px); }
    #cy { min-height: 420px; background: white; }
    aside { overflow: auto; padding: 18px; border-left: 1px solid #dbe2ea; background: #f8fafc; min-width: 0; }
    aside h2 { margin-top: 0; font-size: 17px; }
    .field { margin-bottom: 12px; overflow-wrap: anywhere; }
    .field strong { display: block; color: #475569; font-size: 12px; text-transform: uppercase; }
    #tooltip { position: fixed; display: none; z-index: 10; pointer-events: none; padding: 7px 9px; border-radius: 5px; background: #111827; color: white; font-size: 12px; }
    .summary { margin-left: auto; color: #cbd5e1; font-size: 12px; }
    #node-list { margin-top: 14px; border-top: 1px solid #dbe2ea; padding-top: 10px; }
    #node-list summary { cursor: pointer; color: #475569; font-size: 13px; }
    #node-list ul { list-style: none; margin: 8px 0 0; padding: 0; }
    #node-list button { display: block; width: 100%; text-align: left; margin: 2px 0; padding: 6px 8px; border: 0; border-radius: 5px; background: transparent; font-size: 13px; }
    #node-list button:hover { background: #e2e8f0; }
    /* Small screens: the details panel stacks below the graph — it is
       never hidden, so every device inspection stays available. */
    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; grid-template-rows: minmax(320px, 55vh) auto; height: auto; }
      aside { border-left: 0; border-top: 1px solid #dbe2ea; max-height: 45vh; }
      .summary { flex-basis: 100%; margin-left: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Atlas Topology Viewer</h1>
    <input id="search" type="search" placeholder="Search hostname, IP, vendor, or platform" aria-label="Search topology">
    <button id="fit" type="button">Fit graph</button>
    <span class="summary" id="summary"></span>
  </header>
  <main>
    <div id="cy" role="img" aria-label="Interactive topology graph. Use the device list in the details panel for a keyboard-accessible alternative."></div>
    <aside aria-label="Topology details">
      <div id="details">
        <h2>Details</h2>
        <p>Click a node to inspect its normalized information, or a connection to see why Atlas created it, which evidence supports it, and what confidence it has.</p>
      </div>
      <details id="node-list">
        <summary>Device list (keyboard alternative)</summary>
        <ul id="node-list-items"></ul>
      </details>
    </aside>
  </main>
  <div id="tooltip"></div>
  <script>
    const topologyElements = __TOPOLOGY_ELEMENTS__;
    const snapshotSummary = __SNAPSHOT_SUMMARY__;
    const summaryParts = [`${snapshotSummary.device_count} discovered devices`];
    summaryParts.push(`${snapshotSummary.physical_links ?? 0} physical links`);
    if (snapshotSummary.verified_routed) summaryParts.push(`${snapshotSummary.verified_routed} verified routed links`);
    if (snapshotSummary.routing_adjacencies) summaryParts.push(`${snapshotSummary.routing_adjacencies} routing adjacencies`);
    if (snapshotSummary.protocol_peers) summaryParts.push(`${snapshotSummary.protocol_peers} BGP peerings`);
    if (snapshotSummary.unresolved_peers) summaryParts.push(`${snapshotSummary.unresolved_peers} unresolved peer identities`);
    document.getElementById('summary').textContent = summaryParts.join(' · ');

    // The ICON is the device role; COLOR/BORDER is operational state —
    // never shape alone (PR-043.1 stencil framework).
    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements: [...topologyElements.nodes, ...topologyElements.edges],
      layout: { name: 'cose', animate: false, fit: true, padding: 40 },
      minZoom: 0.25,
      maxZoom: 3,
      style: [
        { selector: 'node', style: {
          'shape': 'round-rectangle',
          'background-color': '#ffffff',
          'background-image': 'data(stencil)',
          'background-fit': 'contain',
          'background-clip': 'node',
          'label': 'data(label)', 'color': '#172033',
          /* Cytoscape accepts only normal/bold or multiples of 100. */
          'font-size': 11, 'font-weight': 600,
          'text-valign': 'bottom', 'text-margin-y': 7,
          'width': 46, 'height': 46, 'border-width': 2.5, 'border-color': '#94a3b8'
        }},
        { selector: 'node[kind = "observed"]', style: { 'border-style': 'dashed', 'border-color': '#94a3b8', 'opacity': 0.9 }},
        { selector: 'node[change = "new"]', style: { 'border-color': '#16a34a', 'border-width': 5 }},
        { selector: 'node[change = "changed"]', style: { 'border-color': '#f59e0b', 'border-width': 5 }},
        { selector: 'node[change = "removed"]', style: { 'border-color': '#dc2626', 'border-width': 5, 'border-style': 'dashed', 'opacity': 0.75 }},
        { selector: 'node:selected', style: { 'border-color': '#2563eb', 'border-width': 5 }},
        { selector: 'edge', style: {
          'width': 2, 'line-color': '#94a3b8', 'curve-style': 'bezier'
        }},
        { selector: 'edge[relationship = "physical"]', style: { 'line-style': 'solid' }},
        { selector: 'edge[relationship = "routing-adjacency"]', style: {
          'line-style': 'dashed', 'line-color': '#64748b',
          'label': 'data(protocol)', 'font-size': 9, 'color': '#64748b',
          'text-background-color': '#ffffff', 'text-background-opacity': 0.8
        }},
        { selector: 'edge[relationship = "protocol-peer"]', style: {
          'line-style': 'dotted', 'line-color': '#94a3b8',
          'label': 'data(protocol)', 'font-size': 9, 'color': '#94a3b8',
          'text-background-color': '#ffffff', 'text-background-opacity': 0.8
        }},
        { selector: 'edge[relationship = "verified-routed"]', style: {
          'line-style': 'dashed', 'line-color': '#2563eb', 'width': 2.5,
          'label': 'data(protocol)', 'font-size': 9, 'color': '#2563eb',
          'text-background-color': '#ffffff', 'text-background-opacity': 0.8
        }},
        { selector: 'edge[relationship = "layer-3"]', style: {
          'line-style': 'dashed', 'line-color': '#0ea5e9'
        }},
        { selector: 'edge[relationship = "inferred"]', style: {
          'line-style': 'dotted', 'line-color': '#cbd5e1'
        }},
        { selector: 'edge[relationship = "unknown"]', style: {
          'line-style': 'dotted', 'line-color': '#e2e8f0'
        }},
        { selector: 'edge:selected', style: { 'line-color': '#f59e0b', 'width': 3.5 }},
        { selector: '.search-muted', style: { 'opacity': 0.18 }},
        { selector: '.search-match', style: { 'border-color': '#f59e0b', 'border-width': 5, 'opacity': 1 }}
      ]
    });

    const details = document.getElementById('details');
    const tooltip = document.getElementById('tooltip');
    const escapeHtml = value => String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const nodeDetails = data => {
      const unresolved = data.kind === 'observed';
      const heading = unresolved && (data.observation === 'routing-adjacency' || data.observation === 'protocol-peer')
        ? 'Unknown router' : data.label;
      let html = `
      <h2>${escapeHtml(heading)}</h2>`;
      if (unresolved) {
        html += `
      <p style="font-size:13px;color:#475569;">This peer was observed through routing evidence. Atlas has not yet identified a verified management endpoint.</p>
      ${data.router_id ? `<div class="field"><strong>Router ID</strong>${escapeHtml(data.router_id)}</div>` : ''}
      <div class="field"><strong>Observed via</strong>${escapeHtml(data.observed_via ?? 'neighbor announcement')}</div>
      <div class="field"><strong>Management address</strong>${escapeHtml(data.management_ip)}</div>
      <div class="field"><strong>Discovery status</strong>${escapeHtml(data.discovery_status ?? 'Not discovered')}</div>
      <div class="field"><strong>Observation type</strong>${escapeHtml(data.observation ?? 'unknown')}</div>
      <div class="field"><strong>Role</strong>${escapeHtml(data.role ?? 'unresolved_peer')}</div>
      <div class="field"><strong>Role evidence</strong>${escapeHtml(data.role_evidence ?? '')}</div>`;
        return html;
      }
      html += `
      <div class="field"><strong>Role</strong>${escapeHtml(data.role ?? 'unknown')}</div>
      <div class="field"><strong>Role evidence</strong>${escapeHtml(data.role_evidence ?? 'no role evidence collected')}</div>
      <div class="field"><strong>Discovery status</strong>${escapeHtml(data.discovery_status ?? 'unknown')}</div>
      <div class="field"><strong>Observation type</strong>${escapeHtml(data.observation ?? 'direct discovery')}</div>
      <div class="field"><strong>Aliases</strong>${escapeHtml((data.aliases || []).join(', ') || 'None')}</div>
      <div class="field"><strong>Management IP</strong>${escapeHtml(data.management_ip)}</div>
      <div class="field"><strong>Vendor</strong>${escapeHtml(data.vendor)}</div>
      <div class="field"><strong>Platform</strong>${escapeHtml(data.platform)}</div>
      <div class="field"><strong>Operating system</strong>${escapeHtml(data.os)}</div>
      <div class="field"><strong>Interfaces</strong>${escapeHtml(data.interfaces)}</div>
      <div class="field"><strong>Neighbors</strong>${escapeHtml(data.neighbors ?? 0)}</div>
      <div class="field"><strong>Discovery depth</strong>${escapeHtml(data.discovery_depth ?? 'unknown')}</div>
      <div class="field"><strong>Last discovered</strong>${escapeHtml(data.last_discovered ?? 'unrecorded')}</div>
      <div class="field"><strong>Configuration collected</strong>${escapeHtml(data.config_collected ?? 'No')}</div>
      <div class="field"><strong>Last configuration change</strong>${escapeHtml(data.last_config_change ?? 'None recorded')}</div>`;
      return html;
    };

    // PR-043.7 (FUSION): clicking any relationship explains WHY Atlas
    // created it, WHICH evidence supports it, and WHAT confidence it has.
    const edgeDetails = data => {
      const label = id => {
        const node = cy.getElementById(id);
        return node.length ? node.data('label') : id;
      };
      let html = `
      <h2>${escapeHtml(label(data.source))} &harr; ${escapeHtml(label(data.target))}</h2>`;
      if (data.fused_type) {
        html += `
      <div class="field"><strong>Relationship type</strong>${escapeHtml(data.fused_type)}</div>
      <div class="field"><strong>Confidence</strong>${escapeHtml(data.confidence)}%</div>
      <div class="field"><strong>Interfaces</strong>${escapeHtml(data.source_interface)} &harr; ${escapeHtml(data.target_interface)}</div>
      <div class="field"><strong>Why this relationship exists</strong>
        <ul style="margin:6px 0 0;padding-left:18px;font-size:13px;">
          ${(data.evidence || []).map(item => `<li><em>P${escapeHtml(item.priority)} ${escapeHtml(item.kind)}</em> — ${escapeHtml(item.detail)}${item.source_command ? ` <span style="color:#64748b;">(${escapeHtml(item.source_command)})</span>` : ''}</li>`).join('')}
        </ul>
      </div>
      <div class="field"><strong>Commands contributing evidence</strong>${escapeHtml((data.contributing_commands || []).join(', ') || 'None recorded')}</div>`;
        if ((data.conflicts || []).length) {
          html += `
      <div class="field"><strong>Conflicting observations</strong>
        <ul style="margin:6px 0 0;padding-left:18px;font-size:13px;color:#b45309;">
          ${data.conflicts.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
        </ul>
      </div>`;
        }
        return html;
      }
      html += `
      <div class="field"><strong>Relationship type</strong>${escapeHtml(data.relationship ?? 'unknown')} (observed)</div>
      <div class="field"><strong>Observed via</strong>${escapeHtml((data.protocol || 'unknown').toUpperCase())}</div>
      <div class="field"><strong>Interfaces</strong>${escapeHtml(data.source_interface)} &harr; ${escapeHtml(data.target_interface)}</div>
      <p style="font-size:13px;color:#475569;">This connection is a single observation that evidence correlation could not verify against a discovered device. It is shown as observed, not verified.</p>`;
      return html;
    };

    cy.on('tap', 'node', event => { details.innerHTML = nodeDetails(event.target.data()); });
    cy.on('tap', 'edge', event => { details.innerHTML = edgeDetails(event.target.data()); });

    // Keyboard alternative to pointer interaction: every node is listed as
    // a real button that selects it, centres it, and shows its details.
    const nodeListItems = document.getElementById('node-list-items');
    cy.nodes().sort((a, b) => String(a.data('label')).localeCompare(String(b.data('label'))))
      .forEach(node => {
        const item = document.createElement('li');
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = `${node.data('label')} (${node.data('management_ip')})`;
        button.addEventListener('click', () => {
          cy.elements().unselect();
          node.select();
          const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          cy.animate({ center: { eles: node } }, { duration: reduceMotion ? 0 : 150 });
          details.innerHTML = nodeDetails(node.data());
        });
        item.appendChild(button);
        nodeListItems.appendChild(item);
      });

    // Keep the graph valid across container resizes (viewport changes,
    // iframe remounts, drawer toggles in the host page).
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => { cy.resize(); }, 150);
    });
    cy.on('mouseover', 'node', event => {
      tooltip.textContent = `${event.target.data('label')} · ${event.target.data('management_ip')}`;
      tooltip.style.display = 'block';
    });
    cy.on('mousemove', event => {
      if (event.originalEvent) {
        tooltip.style.left = `${event.originalEvent.clientX + 12}px`;
        tooltip.style.top = `${event.originalEvent.clientY + 12}px`;
      }
    });
    cy.on('mouseout', 'node', () => { tooltip.style.display = 'none'; });
    document.getElementById('fit').addEventListener('click', () => cy.fit(undefined, 40));
    document.getElementById('search').addEventListener('input', event => {
      const query = event.target.value.trim().toLowerCase();
      cy.nodes().removeClass('search-match search-muted');
      if (!query) return;
      cy.nodes().forEach(node => {
        const data = node.data();
        const haystack = [data.label, (data.aliases || []).join(' '), data.management_ip, data.vendor, data.platform, data.os].join(' ').toLowerCase();
        node.addClass(haystack.includes(query) ? 'search-match' : 'search-muted');
      });
    });
  </script>
</body>
</html>
