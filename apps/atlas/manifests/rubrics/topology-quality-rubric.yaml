id: rub_01ARZ3NDEKTSV4RRFFQ69G5FAZ
name: Atlas Topology Snapshot Quality
version: 1.0.0
description: Deterministic structural quality gate for normalized Atlas topology snapshots.
status: active
maturity: experimental
applies_to:
  artifact_type: topology_snapshot
  schema_ref: schemas/topology-snapshot.schema.json
rules:
  - id: topology.devices_required
    name: Devices Required
    description: A topology snapshot must include its canonical devices collection.
    severity: critical
    type: required_field
    parameters: {field: devices}
  - id: topology.device_count
    name: Device Count
    description: At least one canonical device must be present.
    severity: critical
    type: minimum_length
    parameters: {field: devices, minimum: 1}
  - id: topology.edges_required
    name: Edges Required
    description: The snapshot must explicitly include observed edges.
    severity: error
    type: required_field
    parameters: {field: edges}
  - id: topology.warnings_required
    name: Warnings Required
    description: Reconciliation warnings must be explicit, including an empty collection.
    severity: error
    type: required_field
    parameters: {field: warnings}
scoring:
  method: passed_finding_ratio
  precision: 6
  blocking_severities: [error, critical]
pass_threshold: 1.0
metadata:
  owner: founderos.atlas
  deterministic: true
