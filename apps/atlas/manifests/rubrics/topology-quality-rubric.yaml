id: rub_01ARZ3NDEKTSV4RRFFQ69G5FAZ
name: Atlas Topology Snapshot Quality
version: 1.0.0
description: Deterministic structural quality gate for normalized Atlas topology snapshots.
status: active
maturity: experimental
applies_to:
  artifact_type: topology_snapshot
  schema_ref: schemas/topology-snapshot.schema.json
rules:
  - id: topology.device_required
    name: Device Required
    description: A topology snapshot must identify its discovered device.
    severity: critical
    type: required_field
    parameters: {field: device}
  - id: topology.interfaces_required
    name: Interfaces Required
    description: A topology snapshot must include normalized interfaces.
    severity: critical
    type: required_field
    parameters: {field: interfaces}
  - id: topology.interface_count
    name: Interface Count
    description: At least one normalized interface must be present.
    severity: error
    type: minimum_length
    parameters: {field: interfaces, minimum: 1}
  - id: topology.neighbors_required
    name: Neighbors Required
    description: Neighbor observations must be explicit, including an empty collection.
    severity: error
    type: required_field
    parameters: {field: neighbors}
scoring:
  method: passed_finding_ratio
  precision: 6
  blocking_severities: [error, critical]
pass_threshold: 1.0
metadata:
  owner: founderos.atlas
  deterministic: true
