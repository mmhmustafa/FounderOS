$schema: https://json-schema.org/draft/2020-12/schema
$id: https://founderos.dev/contracts/agent/agent.schema.yaml
title: FounderOS Agent Manifest
description: Immutable, versioned metadata for a stateless Agent definition.
type: object
additionalProperties: false
required:
  - id
  - name
  - version
  - description
  - role
  - domain
  - status
  - capabilities
  - skills
  - inputs
  - outputs
  - constraints
  - allowed_tool_categories
  - provider_preferences
  - evaluation
  - handoff
  - maturity
properties:
  id:
    type: string
    pattern: ^agt_[0-7][0-9A-HJKMNP-TV-Z]{25}$
    description: Immutable canonical Agent definition ID.
  name:
    type: string
    minLength: 1
    maxLength: 120
  version:
    type: string
    pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'
    description: Semantic Versioning 2.0.0 version for this immutable definition.
  description:
    type: string
    minLength: 1
    maxLength: 1000
  role:
    type: string
    minLength: 1
    maxLength: 120
  domain:
    type: string
    minLength: 1
    maxLength: 120
  status:
    type: string
    enum: [draft, active, deprecated, retired]
    description: Publication status; status never grants execution authority.
  capabilities:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/$defs/slug'
  skills:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/slug'
    description: Descriptive routing tags, not executable code or prompt content.
  inputs:
    type: array
    items:
      $ref: '#/$defs/artifactPort'
  outputs:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/artifactPort'
  constraints:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      maxLength: 500
  allowed_tool_categories:
    type: array
    uniqueItems: true
    items:
      type: string
      enum:
        - filesystem
        - network
        - git
        - browser
        - shell
        - python
        - docker
        - cloud
        - notification
    description: Declared maximum categories; authorization is still required for every execution.
  provider_preferences:
    type: object
    additionalProperties: false
    required: [required_capabilities, data_handling, allow_external]
    properties:
      required_capabilities:
        type: array
        uniqueItems: true
        items:
          type: string
          enum: [text_generation, structured_output, tool_calling, vision]
      data_handling:
        type: string
        enum: [local_only, restricted, standard]
      allow_external:
        type: boolean
    description: Provider-neutral capability preferences; provider names and model configuration are prohibited.
  evaluation:
    type: object
    additionalProperties: false
    required: [rubric_refs, human_review]
    properties:
      rubric_refs:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          $ref: '#/$defs/pathRef'
      human_review:
        type: string
        enum: [required, conditional, not_required]
  handoff:
    type: object
    additionalProperties: false
    required: [requires_summary, allowed_roles, artifact_types]
    properties:
      requires_summary:
        type: boolean
      allowed_roles:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
          maxLength: 120
      artifact_types:
        type: array
        uniqueItems: true
        items:
          $ref: '#/$defs/slug'
  maturity:
    type: string
    enum: [experimental, beta, stable, deprecated]
$defs:
  slug:
    type: string
    pattern: '^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$'
    maxLength: 120
  pathRef:
    type: string
    minLength: 1
    maxLength: 500
    pattern: '^(?![a-zA-Z][a-zA-Z0-9+.-]*://)(?!/)(?!.*(?:^|/)\.\.(?:/|$)).+$'
    description: Package-relative immutable asset reference; remote URLs and parent traversal are prohibited.
  artifactPort:
    type: object
    additionalProperties: false
    required: [name, artifact_type, schema_ref, required]
    properties:
      name:
        $ref: '#/$defs/slug'
      artifact_type:
        $ref: '#/$defs/slug'
      schema_ref:
        $ref: '#/$defs/pathRef'
      required:
        type: boolean
