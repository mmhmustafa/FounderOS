$schema: https://json-schema.org/draft/2020-12/schema
$id: https://founderos.dev/contracts/app/app.schema.yaml
title: FounderOS App Package Manifest
description: Immutable, versioned index of declarative FounderOS definitions and assets.
type: object
additionalProperties: false
required:
  - id
  - name
  - version
  - description
  - domain
  - status
  - maturity
  - compatible_runtime
  - publisher
  - content_digest
  - workflows
  - agents
  - artifacts
  - prompts
  - evaluations
  - policies
  - fixtures
  - documentation
  - dependencies
  - tags
properties:
  id:
    $ref: '#/$defs/packageId'
    description: Stable namespaced package identity; an App is not a runtime entity.
  name:
    type: string
    minLength: 1
    maxLength: 160
  version:
    $ref: '#/$defs/semver'
  description:
    type: string
    minLength: 1
    maxLength: 1000
  domain:
    $ref: '#/$defs/slug'
  status:
    type: string
    enum: [draft, active, deprecated, retired]
  maturity:
    type: string
    enum: [experimental, beta, stable, deprecated]
  compatible_runtime:
    $ref: '#/$defs/versionRange'
  publisher:
    type: object
    additionalProperties: false
    required: [id, name, trust]
    properties:
      id:
        $ref: '#/$defs/packageId'
      name:
        type: string
        minLength: 1
        maxLength: 160
      trust:
        type: string
        const: first_party
    description: PR-003 accepts bundled first-party packages only; signing and third-party trust are deferred.
  content_digest:
    type: string
    pattern: '^sha256:[0-9a-f]{64}$'
    description: Digest of the immutable packaged assets using a future canonical package algorithm; the manifest field itself is excluded.
  workflows:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/$defs/workflowRef'
  agents:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/$defs/agentRef'
  artifacts:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/$defs/artifactAsset'
  prompts:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/versionedAsset'
  evaluations:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/versionedAsset'
  policies:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/versionedAsset'
  fixtures:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/fixtureAsset'
  documentation:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/$defs/documentationAsset'
  dependencies:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/appDependency'
  tags:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/$defs/slug'
$defs:
  semver:
    type: string
    pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'
  versionRange:
    type: string
    pattern: '^>=(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*) <(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
    description: Canonical inclusive-minimum/exclusive-maximum compatibility range.
  packageId:
    type: string
    minLength: 3
    maxLength: 200
    pattern: '^[a-z][a-z0-9]*(?:[.-][a-z0-9]+)+$'
  slug:
    type: string
    pattern: '^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$'
    maxLength: 120
  pathRef:
    type: string
    minLength: 1
    maxLength: 500
    pattern: '^(?![a-zA-Z][a-zA-Z0-9+.-]*://)(?!/)(?!.*(?:^|/)\.\.(?:/|$)).+$'
    description: Package-relative asset reference; remote URLs, absolute paths, and parent traversal are prohibited.
  workflowRef:
    type: object
    additionalProperties: false
    required: [id, version, manifest_ref]
    properties:
      id:
        type: string
        pattern: '^wfl_[0-7][0-9A-HJKMNP-TV-Z]{25}$'
      version:
        $ref: '#/$defs/semver'
      manifest_ref:
        $ref: '#/$defs/pathRef'
  agentRef:
    type: object
    additionalProperties: false
    required: [id, version, manifest_ref]
    properties:
      id:
        type: string
        pattern: '^agt_[0-7][0-9A-HJKMNP-TV-Z]{25}$'
      version:
        $ref: '#/$defs/semver'
      manifest_ref:
        $ref: '#/$defs/pathRef'
  artifactAsset:
    type: object
    additionalProperties: false
    required: [id, version, schema_ref]
    properties:
      id:
        $ref: '#/$defs/slug'
      version:
        $ref: '#/$defs/semver'
      schema_ref:
        $ref: '#/$defs/pathRef'
  versionedAsset:
    type: object
    additionalProperties: false
    required: [id, version, path]
    properties:
      id:
        $ref: '#/$defs/slug'
      version:
        $ref: '#/$defs/semver'
      path:
        $ref: '#/$defs/pathRef'
  fixtureAsset:
    type: object
    additionalProperties: false
    required: [id, path, sha256]
    properties:
      id:
        $ref: '#/$defs/slug'
      path:
        $ref: '#/$defs/pathRef'
      sha256:
        type: string
        pattern: '^[0-9a-f]{64}$'
  documentationAsset:
    type: object
    additionalProperties: false
    required: [id, path]
    properties:
      id:
        $ref: '#/$defs/slug'
      path:
        $ref: '#/$defs/pathRef'
  appDependency:
    type: object
    additionalProperties: false
    required: [id, version_range, optional]
    properties:
      id:
        $ref: '#/$defs/packageId'
      version_range:
        $ref: '#/$defs/versionRange'
      optional:
        type: boolean
