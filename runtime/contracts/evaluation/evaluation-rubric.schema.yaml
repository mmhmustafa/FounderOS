$schema: https://json-schema.org/draft/2020-12/schema
$id: https://founderos.dev/contracts/evaluation/evaluation-rubric.schema.yaml
title: FounderOS Evaluation Rubric Manifest
description: Immutable reusable deterministic quality rules for one Artifact type.
type: object
additionalProperties: false
required:
  - id
  - name
  - version
  - description
  - status
  - maturity
  - applies_to
  - rules
  - scoring
  - pass_threshold
  - metadata
properties:
  id:
    type: string
    pattern: ^rub_[0-7][0-9A-HJKMNP-TV-Z]{25}$
  name:
    type: string
    minLength: 1
    maxLength: 160
  version:
    $ref: '#/$defs/semver'
  description:
    type: string
    minLength: 1
    maxLength: 1000
  status:
    type: string
    enum: [draft, active, deprecated, retired]
  maturity:
    type: string
    enum: [experimental, beta, stable, deprecated]
  applies_to:
    type: object
    additionalProperties: false
    required: [artifact_type, schema_ref]
    properties:
      artifact_type:
        type: string
        pattern: ^[a-z][a-z0-9_]*$
      schema_ref:
        type: string
        pattern: ^schemas/[A-Za-z0-9._/-]+\.(json|ya?ml)$
  rules:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/rule'
  scoring:
    type: object
    additionalProperties: false
    required: [method, precision, blocking_severities]
    properties:
      method:
        const: passed_finding_ratio
      precision:
        const: 6
      blocking_severities:
        type: array
        const: [error, critical]
  pass_threshold:
    type: number
    minimum: 0
    maximum: 1
  metadata:
    type: object
    additionalProperties:
      oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: 'null'
$defs:
  semver:
    type: string
    pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'
  rule:
    type: object
    additionalProperties: false
    required: [id, name, description, severity, type, parameters]
    properties:
      id:
        type: string
        pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
      name:
        type: string
        minLength: 1
        maxLength: 160
      description:
        type: string
        minLength: 1
        maxLength: 500
      severity:
        type: string
        enum: [info, warning, error, critical]
      type:
        type: string
        enum: [required_field, schema, minimum_length, regex, custom]
      parameters:
        type: object
    allOf:
      - if:
          properties: {type: {const: required_field}}
          required: [type]
        then:
          properties:
            parameters:
              $ref: '#/$defs/fieldParameters'
      - if:
          properties: {type: {const: minimum_length}}
          required: [type]
        then:
          properties:
            parameters:
              type: object
              additionalProperties: false
              required: [field, minimum]
              properties:
                field: {$ref: '#/$defs/field'}
                minimum: {type: integer, minimum: 0}
      - if:
          properties: {type: {const: regex}}
          required: [type]
        then:
          properties:
            parameters:
              type: object
              additionalProperties: false
              required: [field, pattern]
              properties:
                field: {$ref: '#/$defs/field'}
                pattern: {type: string}
      - if:
          properties: {type: {const: schema}}
          required: [type]
        then:
          properties:
            parameters:
              type: object
              additionalProperties: false
              required: [schema]
              properties:
                field: {$ref: '#/$defs/field'}
                schema: {type: object}
      - if:
          properties: {type: {const: custom}}
          required: [type]
        then:
          properties:
            parameters:
              type: object
              required: [handler]
              properties:
                handler: {type: string, minLength: 1}
  fieldParameters:
    type: object
    additionalProperties: false
    required: [field]
    properties:
      field: {$ref: '#/$defs/field'}
  field:
    type: string
    pattern: ^[A-Za-z0-9_-]+(?:\.[A-Za-z0-9_-]+)*$

